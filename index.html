<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leefbaar3B | Onze Stem Voor Nederland</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #003399;
            --accent-red: #e60000;
            --logo-orange: #f58220;
            --logo-green: #4f7c39;
            --text-dark: #1a1a1a;
            --bg-light: #f4f7f6;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg-light); color: var(--text-dark); overflow-x: hidden; }

        /* --- NAVIGATIE --- */
        nav { position: fixed; top: 30px; right: 50px; z-index: 1000; }
        .nav-link {
            color: var(--white); text-decoration: none; font-weight: 700; font-size: 1.1rem;
            text-transform: uppercase; padding: 12px 25px; border: 2px solid var(--white);
            border-radius: 5px; transition: all 0.3s ease; background: rgba(0,0,0,0.4); cursor: pointer;
            backdrop-filter: blur(5px);
        }
        .nav-link:hover { background: var(--accent-red); border-color: var(--accent-red); transform: scale(1.05); }

        /* --- LOGO --- */
        .logo-container { position: relative; width: 120px; height: 100px; margin-bottom: 20px; }
        .logo-orange-sq { position: absolute; width: 75px; height: 75px; background: var(--logo-orange); top: 0; left: 0; transform: rotate(-10deg); border-radius: 5px; }
        .logo-green-sq { position: absolute; width: 80px; height: 80px; background: var(--logo-green); bottom: 0; right: 0; border-radius: 5px; display: flex; align-items: center; justify-content: center; box-shadow: 2px 2px 10px rgba(0,0,0,0.2); }
        .logo-text { color: var(--white); font-size: 2.5rem; font-weight: 900; letter-spacing: -2px; }

        /* --- HERO --- */
        header {
            height: 100vh; background: linear-gradient(135deg, rgba(0,51,153,0.85) 0%, rgba(0,20,60,1) 100%), url('https://images.unsplash.com/photo-1529027301783-04e9c700938f?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--white); text-align: center; padding: 0 20px;
        }
        .hero-text h1 { font-size: 5rem; font-weight: 900; text-transform: uppercase; letter-spacing: -3px; margin-bottom: 10px; }
        .hero-text p { font-size: 1.6rem; margin-bottom: 40px; }
        .btn-action { padding: 18px 50px; background: var(--accent-red); color: var(--white); text-decoration: none; border-radius: 5px; font-weight: 700; text-transform: uppercase; transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(230,0,0,0.4); }

        /* --- GRID --- */
        .grid-section { padding: 100px 5%; background: var(--bg-light); }
        .grid-section h2 { text-align: center; font-size: 3rem; color: var(--primary-blue); margin-bottom: 60px; font-weight: 900; }
        .provincie-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

        .card {
            position: relative; height: 300px; border-radius: 8px; overflow: hidden; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.4s ease;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(230,0,0,0.2); }
        .card:hover img { transform: scale(1.1); filter: brightness(50%); }

        .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%); display: flex; flex-direction: column; justify-content: flex-end; padding: 25px; color: var(--white); }
        .card-overlay h3 { font-size: 1.6rem; font-weight: 800; }

        /* --- GEWELDIGE MODAL ANIMATIE --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,10,30,0.95);
            display: none; justify-content: center; align-items: center;
            z-index: 10000; padding: 20px;
        }
        .modal.show { display: flex; animation: fadeIn 0.3s forwards; }

        .modal-content {
            background: var(--white); padding: 50px; max-width: 750px; width: 100%;
            border-radius: 4px; position: relative; border-top: 10px solid var(--accent-red);
            box-shadow: 0 0 50px rgba(230,0,0,0.3);
            /* De "Open" Animatie */
            transform: translateY(100px) scale(0.9); opacity: 0;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .modal.show .modal-content { transform: translateY(0) scale(1); opacity: 1; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 2.5rem; cursor: pointer; color: var(--primary-blue); }
        .text-block { background: #f8f9fa; border-left: 5px solid var(--logo-orange); padding: 15px 20px; margin-bottom: 12px; font-size: 1.1rem; }
        .incoming { text-align: center; color: var(--accent-red); font-weight: 800; margin-top: 25px; }

        footer { padding: 60px; background: var(--primary-blue); color: var(--white); text-align: center; }
    </style>
</head>
<body>

    <nav><div class="nav-link" onclick="openMeerModal()">Meer</div></nav>

    <header>
        <div class="logo-container">
            <div class="logo-orange-sq"></div>
            <div class="logo-green-sq"><span class="logo-text">L3B</span></div>
        </div>
        <div class="hero-text">
            <h1>LEEFBAAR 3B</h1>
            <p>Onze eigen mensen op nummer één.</p>
            <a href="#plannen" class="btn-action">Onze regio plannen</a>
        </div>
    </header>

    <section id="plannen" class="grid-section">
        <h2>Plannen per Provincie</h2>
        <div class="provincie-grid" id="grid">
            </div>
    </section>

    <div id="info-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-content-area" class="modal-body"></div>
        </div>
    </div>

    <footer>
        <h2>Leefbaar 3B</h2>
        <p>&copy; 2026 Lijsttrekker Kenny. De nuchtere stem van Nederland.</p>
    </footer>

    <script>
        const provincies = [
            { n: 'Groningen', s: 'Gaswinning en Veiligheid', t: 'Groningers hebben recht op veiligheid en een eerlijke vergoeding. Wij stoppen het gesol met schadeclaims en bouwen huizen voor de eigen inwoners, niet voor opvang.' },
            { n: 'Friesland', s: 'Cultuur en Traditie', t: 'Friese tradities en de eigen taal moeten worden gekoesterd. Geen dwang van buitenaf, maar ruimte voor de eigen dorpsgemeenschap en boeren.' },
            { n: 'Drenthe', s: 'Rust en Ruimte', t: 'Drenthe is geen afvoerputje voor landelijke problemen. Wij beschermen de rust en weren grootschalige AZC’s uit onze dorpen.' },
            { n: 'Overijssel', s: 'Samenleving Centraal', t: 'Versterken van het verenigingsleven in Twente en Salland. Wij kiezen voor de lokale mkb’er en behoud van de eigen identiteit.' },
            { n: 'Flevoland', s: 'Nieuwe Grond, Eigen Mensen', t: 'Flevoland is gebouwd voor onze eigen toekomst. Woningen moeten naar starters uit de eigen regio, niet naar Haagse projecten.' },
            { n: 'Gelderland', s: 'Trots op de Regio', t: 'Geen windmolens op de Veluwe. Wij kiezen voor de Gelderse boer en veilige dorpen waar mensen elkaar nog kennen.' },
            { n: 'Utrecht', s: 'Eerst de Inwoner', t: 'Utrecht is het hart van Nederland, maar de Utrechter staat centraal. Stoppen met voorrang voor statushouders bij woningtoewijzing.' },
            { n: 'Noord-Holland', s: 'Behoud Karakter', t: 'Noord-Holland is meer dan Amsterdam. Wij beschermen de eigen woningmarkt voor onze jongeren en weren illegale invloeden.' },
            { n: 'Zuid-Holland', s: 'Werken moet Lonen', t: 'Investeren in de haven en het Westland. Ruimte voor de auto en de eigen burger, geen extra lasten voor klimaatgekte.' },
            { n: 'Zeeland', s: 'Veiligheid aan de Kust', t: 'Zeeland moet bereikbaar en leefbaar blijven. Wij staan pal voor onze vissers en de veiligheid in de kustgemeenten.' },
            { n: 'Noord-Brabant', s: 'Brabantse Kracht', t: 'Respect voor de boerenstand en de lokale tradities. Wij verzetten ons tegen de komst van enorme opvanglocaties.' },
            { n: 'Limburg', s: 'Eigen Identiteit', t: 'Limburg heeft een eigen karakter. Wij beschermen onze grenzen en onze dorpen tegen ongecontroleerde instroom.' }
        ];

        const grid = document.getElementById('grid');
        provincies.forEach(p => {
            grid.innerHTML += `
                <div class="card" onclick="openModal('${p.n}', '${p.s}', '${p.t}')">
                    <img src="https://source.unsplash.com/800x600/?${p.n},netherlands" alt="${p.n}">
                    <div class="card-overlay"><h3>${p.n}</h3><p>Bekijk standpunten</p></div>
                </div>`;
        });

        const modal = document.getElementById('info-modal');
        const contentArea = document.getElementById('modal-content-area');

        function openModal(title, subtitle, text) {
            contentArea.innerHTML = `
                <h2 style="color:var(--primary-blue); font-size:2.5rem; margin-bottom:10px;">${title}</h2>
                <h4 style="color:var(--accent-red); margin-bottom:30px; text-transform:uppercase;">${subtitle}</h4>
                <div class="text-block">${text}</div>
            `;
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function openMeerModal() {
            contentArea.innerHTML = `
                <h2 style="color:var(--primary-blue); font-size:2.5rem;">Onze Cultuur Eerst</h2>
                <div class="text-block">Wij trekken een duidelijke grens bij de islamisering. Onze Nederlandse cultuur is de onbetwiste norm.</div>
                <div class="text-block">Geen parallelle samenlevingen. Onze wetten en tradities staan boven religieuze regels.</div>
                <div class="text-block">Stop de invloed van onverdraagzame ideologieën in onze scholen en wijken. Wij kiezen voor een immigratiestop.</div>
                <div class="text-block">Wie hier woont, past zich volledig aan ons aan. Wij verdedigen onze eigen identiteit.</div>
                <div class="incoming">MEER INKOMEND...</div>
            `;
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('show');
            document.body.style.overflow = 'auto';
        }

        window.onclick = function(e) { if (e.target == modal) closeModal(); }
    </script>
</body>
</html>
